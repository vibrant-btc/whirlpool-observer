services:
  whirlpool-observer:
    build: .
    image: whirlpool-observer:latest
    container_name: whirlpool-observer
    restart: unless-stopped
    init: true
    environment:
      WHIRLPOOL_DATA_DIR: /data
      WHIRLPOOL_REPORTS_DIR: /reports
      WHIRLPOOL_WEB_HOST: 0.0.0.0
      WHIRLPOOL_WEB_PORT: 8080
      WHIRLPOOL_RESCAN_HOURS: ${WHIRLPOOL_RESCAN_HOURS:-12}
      # Optional Tor Browser Onion-Location header. Leave empty to disable.
      # Example: http://exampleexampleexampleexampleexampleexampleexampleexample.onion
      WHIRLPOOL_ONION_LOCATION: ${WHIRLPOOL_ONION_LOCATION:-}
      # Set this to your own self-hosted mempool.space-compatible API URL.
      # Examples: https://mempool.space/api, https://mymempool.example.com/api, http://192.168.1.50:4080/api
      MEMPOOL_API_URL: ${MEMPOOL_API_URL:-https://mempool.space/api}
    ports:
      - "${WHIRLPOOL_WEB_PORT:-8080}:8080"
    volumes:
      - ./data:/data
      - ./reports:/reports
    logging:
      driver: "json-file"
      options:
        max-size: "64k"
        max-file: "1"
    command: ["run"]
