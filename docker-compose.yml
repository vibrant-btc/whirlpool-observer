services:
  whirlpool-observer:
    build:
      context: .
      dockerfile: ${WHIRLPOOL_DOCKERFILE:-Dockerfile}
      args:
        # Hardcoded at image build time for absolute social-card metadata.
        # Set this only when publicly exposing the service.
        WHIRLPOOL_PUBLIC_URL: ${WHIRLPOOL_PUBLIC_URL:-http://localhost:8080}
        # Hardcoded at image build time for Tor Browser's Onion-Location header.
        # Leave empty unless publicly exposing an onion service.
        WHIRLPOOL_ONION_LOCATION: ${WHIRLPOOL_ONION_LOCATION:-}
    image: ${WHIRLPOOL_LOCAL_IMAGE:-whirlpool-observer:latest}
    container_name: whirlpool-observer
    restart: unless-stopped
    init: true
    environment:
      WHIRLPOOL_DATA_DIR: /data
      WHIRLPOOL_REPORTS_DIR: /reports
      WHIRLPOOL_WEB_HOST: 0.0.0.0
      WHIRLPOOL_WEB_PORT: 8080
      WHIRLPOOL_RESCAN_HOURS: ${WHIRLPOOL_RESCAN_HOURS:-12}
      # Set this to your own self-hosted mempool.space-compatible or Blockstream/Esplora-compatible API URL.
      # Examples: https://mempool.space/api, https://mymempool.example.com/api, https://blockstream.info/api, http://192.168.1.50:4080/api
      MEMPOOL_API_URL: ${MEMPOOL_API_URL:-https://mempool.space/api}
      # Used automatically when MEMPOOL_API_URL cannot return required blockchain data.
      # This can be another mempool.space-compatible API or a Blockstream/Esplora-compatible API.
      MEMPOOL_FALLBACK_API_URL: ${MEMPOOL_FALLBACK_API_URL:-https://blockstream.info/api}
    ports:
      - "${WHIRLPOOL_WEB_PORT:-8080}:8080"
    volumes:
      - ./data:/data
      - ./reports:/reports
    logging:
      driver: "json-file"
      options:
        max-size: "64k"
        max-file: "1"
    command: ["run"]
