services:
  ashi-whirlpool:
    build: .
    image: whirlpool-analysis:latest
    container_name: whirlpool-analysis
    restart: unless-stopped
    init: true
    environment:
      WHIRLPOOL_DATA_DIR: /data
      WHIRLPOOL_REPORTS_DIR: /reports
      # Set this to your own self-hosted mempool.space-compatible API URL.
      # Examples: https://mempool.space/api, https://mymempool.example.com/api, http://192.168.1.50:4080/api
      MEMPOOL_API_URL: ${MEMPOOL_API_URL:-https://mempool.space/api}
    volumes:
      - ./data:/data
      - ./reports:/reports
    command: ["run"]
