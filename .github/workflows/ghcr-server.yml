name: Publish server Docker image to GHCR

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Base version tag to publish, for example v1.0.0. The workflow publishes v1.0.0-server and latest-server."
        required: true
        type: string

permissions:
  contents: read
  packages: write

concurrency:
  group: ghcr-server-manual-publish
  cancel-in-progress: false

jobs:
  docker:
    name: Build and publish server image
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set lowercase image name and server tag
        id: image
        shell: bash
        run: |
          version="${{ inputs.version }}"
          version="${version%-server}"
          echo "image_name=${GITHUB_REPOSITORY,,}" >> "$GITHUB_OUTPUT"
          echo "server_version=${version}-server" >> "$GITHUB_OUTPUT"

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ steps.image.outputs.image_name }}
          tags: |
            type=raw,value=latest-server
            type=raw,value=${{ steps.image.outputs.server_version }}
          labels: |
            org.opencontainers.image.title=Whirlpool.Observer Server
            org.opencontainers.image.description=Smaller Whirlpool.Observer server image without matplotlib/static PNG chart generation
            org.opencontainers.image.source=https://github.com/${{ github.repository }}
            org.opencontainers.image.version=${{ steps.image.outputs.server_version }}

      - name: Build and publish multi-architecture server Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile.server
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
