name: Publish Docker image to GHCR

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Version tag to publish, for example v1.0.0"
        required: true
        type: string

permissions:
  contents: read
  packages: write

concurrency:
  group: ghcr-manual-publish
  cancel-in-progress: false

jobs:
  docker:
    name: Build and publish image
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set lowercase image name
        id: image
        shell: bash
        run: echo "image_name=${GITHUB_REPOSITORY,,}" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ steps.image.outputs.image_name }}
          tags: |
            type=raw,value=latest
            type=raw,value=${{ inputs.version }}
          labels: |
            org.opencontainers.image.title=Whirlpool.Observer
            org.opencontainers.image.description=Self-hostable Bitcoin blockchain reader for Whirlpool activity
            org.opencontainers.image.source=https://github.com/${{ github.repository }}
            org.opencontainers.image.version=${{ inputs.version }}

      - name: Build and publish Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
